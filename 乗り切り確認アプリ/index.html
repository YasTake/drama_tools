<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>乗り切り確認</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="乗り切り確認">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #3b5998; --blue-d: #1c2b4a; --blue-light: #eaedfa;
      --green: #1e8e3e; --yellow: #e37400; --red: #b03030;
      --gray: #8890a8; --bg: #eceff5; --text: #1a1f2e; --text2: #505870; --border: #c4c9d8;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; -webkit-tap-highlight-color: transparent; }

    header { background: var(--blue-d); color: #fff; padding: 0 16px; padding-top: env(safe-area-inset-top,0px); height: calc(56px + env(safe-area-inset-top,0px)); display: flex; align-items: flex-end; padding-bottom: 10px; justify-content: space-between; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 10px rgba(0,0,0,.35); }
    header h1 { font-size: 17px; font-weight: 700; letter-spacing: .06em; }
    .hbtns { display: flex; gap: 6px; }
    .hbtn { width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(255,255,255,.18); color: #fff; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .hbtn:active { background: rgba(255,255,255,.35); }

    .proj-strip { background: #121d33; color: rgba(255,255,255,.8); font-size: 12px; padding: 7px 16px; letter-spacing: .04em; display: flex; align-items: center; gap: 8px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.06); }
    .proj-strip span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Tab bar */
    .tab-bar { background: #162238; display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; border-bottom: 2px solid #0d1520; flex-shrink: 0; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item { padding: 9px 16px; color: rgba(255,255,255,.5); font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; flex-shrink: 0; letter-spacing: .02em; user-select: none; -webkit-user-select: none; }
    .tab-item.active { color: #fff; border-bottom-color: #7eb8f7; background: rgba(255,255,255,.06); }
    .tab-item:not(.active):active { background: rgba(255,255,255,.08); }
    .tab-add { padding: 8px 14px; color: rgba(255,255,255,.4); font-size: 20px; background: none; border: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; }
    .tab-add:active { color: rgba(255,255,255,.7); }

    .summary { background: var(--blue-light); display: flex; border-bottom: 1px solid #b8c0d4; }
    .s-item { flex: 1; padding: 9px 4px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .s-item + .s-item { border-left: 1px solid #b8c0d4; }
    .s-num { font-size: 22px; font-weight: 800; line-height: 1; color: var(--blue-d); }
    .s-num.red { color: var(--red); } .s-num.green { color: var(--green); } .s-num.orange { color: var(--yellow); }
    .s-label { font-size: 10px; color: var(--text2); text-align: center; letter-spacing: .03em; }

    .vlist { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .vcard { background: #fff; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.07); overflow: hidden; }
    .vtop { padding: 13px 14px 10px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
    .vdot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .dot-empty { background: #ccc; } .dot-ok { background: var(--green); } .dot-warn { background: var(--yellow); } .dot-full { background: var(--red); }
    .vinfo { flex: 1; min-width: 0; }
    .vname { font-size: 15px; font-weight: 600; }
    .vmeta { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .vcnt { font-size: 22px; font-weight: 800; line-height: 1; white-space: nowrap; }
    .vcnt.empty { color: #ccc; } .vcnt.ok { color: var(--green); } .vcnt.warn { color: var(--yellow); } .vcnt.full { color: var(--red); }
    .vcnt .sep { font-size: 13px; font-weight: 400; color: var(--text2); }
    .vchev { font-size: 18px; color: var(--text2); transition: transform .2s; margin-top: 2px; }
    .vcard.open .vchev { transform: rotate(180deg); }

    .vpbar { height: 4px; background: #e8eaed; margin: 0 14px 10px; border-radius: 2px; overflow: hidden; }
    .vpfill { height: 100%; border-radius: 2px; transition: width .3s; }
    .pfill-ok { background: var(--green); } .pfill-warn { background: var(--yellow); } .pfill-full { background: var(--red); }

    .vmembers { padding: 0 14px 12px; display: flex; flex-wrap: wrap; gap: 5px; min-height: 24px; }
    .chip { display: inline-flex; align-items: center; gap: 3px; background: var(--blue-light); color: var(--blue); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .chip-x { background: none; border: none; color: var(--blue); cursor: pointer; padding: 0 0 0 2px; font-size: 15px; line-height: 1; opacity: .55; display: none; }
    .vcard.open .chip-x { display: inline; }
    .chip-x:active { opacity: 1; }
    .vcard.open .chip { cursor: pointer; }
    .vcard.open .chip:active { background: #c8d0ea; }
    .no-m { font-size: 12px; color: #aaa; font-style: italic; }

    .depart-badge { display: inline-block; background: #fff8e1; color: #e65100; border: 1px solid #ffcc80; border-radius: 4px; padding: 1px 6px; font-size: 11px; font-weight: 700; margin-left: 6px; vertical-align: middle; white-space: nowrap; }

    .move-dest-btn { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 6px; background: #fff; display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin-bottom: 7px; font-size: 14px; font-family: inherit; color: var(--text); text-align: left; }
    .move-dest-btn:active { background: var(--bg); }
    .move-dest-btn.ua-dest { border-color: var(--red); color: var(--red); background: #ffeaea; }
    .move-dest-btn.ua-dest:active { background: #f5c5c5; }
    .move-dest-btn.front-btn { border-color: var(--blue); color: var(--blue); background: var(--blue-light); justify-content: center; font-weight: 700; }
    .move-dest-btn.front-btn:active { background: #c8d0ea; }
    .move-dest-name { font-weight: 500; flex: 1; }
    .move-dest-cnt { font-size: 13px; color: var(--text2); white-space: nowrap; }
    .move-dest-cnt.cnt-full { color: var(--red); font-weight: 600; }
    .move-dest-sep { margin: 8px 0; border: none; border-top: 1px solid var(--border); }
    .rename-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
    .rename-row .fi { flex: 1; }
    .rename-btn { background: var(--blue); color: #fff; border: none; border-radius: 6px; padding: 10px 16px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; font-family: inherit; }
    .rename-btn:active { opacity: .8; }

    .self-card { border-left: 4px solid #607d8b; }
    .self-chip { background: #eceff1; color: #37474f; }
    .self-chip .chip-x { color: #607d8b; }

    .vactions { display: none; padding: 0 14px 14px; gap: 7px; }
    .vcard.open .vactions { display: flex; }
    .abtn { flex: 1; padding: 9px 6px; border-radius: 6px; border: 1px solid var(--border); background: #fff; font-size: 13px; cursor: pointer; text-align: center; font-weight: 600; letter-spacing: .02em; }
    .abtn:active { opacity: .75; }
    .abtn-add { color: var(--blue); border-color: var(--blue); background: var(--blue-light); }
    .abtn-edit { color: var(--text2); }
    .abtn-del { color: var(--red); border-color: #fce8e6; background: #fce8e6; }

    /* Add group button */
    .add-group-btn { width: 100%; padding: 11px; border-radius: 8px; border: 1.5px dashed var(--border); background: #f8f9fc; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; text-align: center; }
    .add-group-btn:active { background: var(--blue-light); color: var(--blue-d); }

    /* EX bulk add */
    .ex-row { display: flex; gap: 6px; align-items: center; margin-bottom: 13px; }
    .ex-prefix { width: 72px !important; }
    .ex-count  { width: 64px !important; }
    .ex-sep-label { font-size: 12px; color: var(--text2); white-space: nowrap; }
    .ex-go { padding: 10px 12px; background: var(--blue-d); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
    .ex-go:active { opacity: .8; }
    .or-divider { display: flex; align-items: center; gap: 8px; margin: 4px 0 14px; color: var(--text2); font-size: 11px; font-weight: 600; letter-spacing: .04em; }
    .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Preset chips */
    .preset-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
    .preset-chip { padding: 7px 13px; border-radius: 20px; border: 1px solid var(--border); background: var(--blue-light); color: var(--blue-d); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .preset-chip:active { background: #c8d0ea; }

    .fab { position: fixed; bottom: calc(14px + env(safe-area-inset-bottom,0px)); right: 16px; width: 56px; height: 56px; border-radius: 50%; background: var(--blue-d); color: #fff; font-size: 28px; border: none; cursor: pointer; box-shadow: 0 4px 18px rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; z-index: 50; transition: transform .1s; }
    .fab:active { transform: scale(.92); }

    .ua-bar { position: fixed; bottom: calc(82px + env(safe-area-inset-bottom,0px)); left: 12px; right: 12px; background: rgba(200,30,22,.93); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 16px; padding: 11px 14px 13px; color: #fff; z-index: 45; box-shadow: 0 4px 24px rgba(200,30,22,.45); display: none; max-height: 160px; overflow-y: auto; }
    .ua-bar.visible { display: block; }
    .ua-bar-hd { display: flex; align-items: center; gap: 6px; margin-bottom: 9px; }
    .ua-bar-title { font-size: 13px; font-weight: 700; flex: 1; }
    .ua-bar-add { background: rgba(255,255,255,.22); border: none; color: #fff; border-radius: 50%; width: 28px; height: 28px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .ua-bar-add:active { background: rgba(255,255,255,.38); }
    .ua-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .ua-chip { display: inline-flex; align-items: center; gap: 3px; background: rgba(255,255,255,.2); color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid rgba(255,255,255,.35); cursor: pointer; }
    .ua-chip:active { background: rgba(255,255,255,.35); }
    .ua-chip-x { background: none; border: none; color: rgba(255,255,255,.7); cursor: pointer; padding: 0 0 0 2px; font-size: 14px; line-height: 1; }
    .ua-chip-x:active { color: #fff; }

    .mbg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.48); z-index: 200; align-items: flex-end; justify-content: center; }
    .mbg.show { display: flex; }
    .mbox { background: #fff; border-radius: 14px 14px 0 0; width: 100%; max-width: 640px; padding: 0 20px calc(28px + env(safe-area-inset-bottom,0px)); max-height: 90dvh; overflow-y: auto; animation: su .22s ease; }
    @keyframes su { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .mhandle { width: 36px; height: 4px; background: #ccc; border-radius: 2px; margin: 10px auto 16px; }
    .mtitle { font-size: 16px; font-weight: 700; margin-bottom: 16px; letter-spacing: .04em; }
    .frow { display: flex; gap: 10px; }
    .fg { flex: 1; margin-bottom: 13px; }
    .fl { display: block; font-size: 11px; color: var(--text2); font-weight: 700; letter-spacing: .06em; margin-bottom: 5px; }
    .fi { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 16px; color: var(--text); outline: none; font-family: inherit; background: #fff; }
    .fi:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(59,89,152,.15); }
    textarea.fi { resize: vertical; }
    .mbtns { display: flex; gap: 10px; margin-top: 6px; }
    .mbtn { flex: 1; padding: 13px; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; letter-spacing: .04em; cursor: pointer; font-family: inherit; }
    .mbtn:active { opacity: .8; }
    .mc { background: var(--bg); color: var(--text2); }
    .mok { background: var(--blue-d); color: #fff; }
    .mdel { background: var(--red); color: #fff; }

    .toast { position: fixed; top: calc(70px + env(safe-area-inset-top,0px)); left: 50%; transform: translateX(-50%) translateY(-8px); background: #1c2b4a; color: #fff; padding: 9px 22px; border-radius: 20px; font-size: 13px; font-weight: 600; letter-spacing: .04em; pointer-events: none; opacity: 0; transition: opacity .18s, transform .18s; white-space: nowrap; z-index: 300; box-shadow: 0 3px 12px rgba(0,0,0,.3); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media print {
      @page { size: A4 landscape; margin: 10mm 12mm; }
      body { background: #fff; font-size: 10px; }
      header, .proj-strip, .tab-bar, .summary, .fab, .toast, .mbg, .vactions, .chip-x, .vchev, .hbtns, .ua-bar { display: none !important; }
      #app { display: none !important; }
      #pview { display: block !important; }
    }
    #pview { display: none; }
    .p-hd { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2.5px solid #1c2b4a; padding-bottom: 3mm; margin-bottom: 5mm; }
    .p-main-title { font-size: 20px; font-weight: 900; letter-spacing: .04em; }
    .p-meta { font-size: 9.5px; color: #777; text-align: right; line-height: 1.65; }
    .p-tbl { width: 100%; border-collapse: collapse; font-size: 11.5px; }
    .p-tbl thead tr { background: #1c2b4a; color: #fff; }
    .p-tbl thead th { padding: 5px 9px; font-weight: 700; text-align: left; white-space: nowrap; letter-spacing: .03em; }
    .p-tbl thead th.th-c { text-align: center; }
    .p-tbl tbody tr { border-bottom: 0.5px solid #ddd; }
    .p-tbl tbody tr:last-child { border-bottom: none; }
    .p-tbl tbody td { padding: 5.5px 9px; vertical-align: middle; }
    .tr-full { background: #fff6f6; }
    .td-name { font-weight: 700; white-space: nowrap; border-left: 4px solid #bbb; font-size: 12px; }
    .td-name.st-ok { border-left-color: #1e8e3e; } .td-name.st-warn { border-left-color: #e37400; }
    .td-name.st-full { border-left-color: #b03030; color: #b03030; }
    .td-name.st-self { border-left-color: #607d8b; } .td-name.st-ua { border-left-color: #b03030; color: #b03030; }
    .td-sub { color: #555; white-space: nowrap; }
    .td-dep { white-space: nowrap; color: #e65100; font-weight: 700; }
    .td-cnt { text-align: center; font-weight: 800; font-size: 13px; white-space: nowrap; letter-spacing: -.01em; }
    .td-cnt.cnt-ok { color: #1e8e3e; } .td-cnt.cnt-warn { color: #e37400; } .td-cnt.cnt-full { color: #b03030; } .td-cnt.cnt-self { color: #607d8b; }
    .td-mem { line-height: 1.7; }
    .p-ntag { display: inline-block; border-radius: 3px; padding: 1px 6px; margin: 1px 2px; font-size: 10.5px; white-space: nowrap; }
    .p-ntag.nt-v { background: #eaedfa; color: #1c2b4a; border: 1px solid #c4c9d8; }
    .p-ntag.nt-self { background: #eceff1; color: #37474f; border: 1px solid #b0bec5; }
    .p-ntag.nt-ua { background: #ffeaea; color: #b03030; border: 1px solid #f0b8b8; }
    .tr-divider td { background: #f2f2f2; color: #444; font-weight: 700; font-size: 10px; padding: 3px 9px; border-bottom: 1px solid #ccc; border-left: 4px solid #607d8b; letter-spacing: .04em; }
    .tr-divider.dv-ua td { background: #ffeaea; color: #b03030; border-left-color: #b03030; }
  </style>
</head>
<body>

<div id="app">
  <header>
    <h1>🚌 乗り切り確認</h1>
    <div class="hbtns">
      <button class="hbtn" onclick="openAddMember('unassigned')" title="未配車に追加">👤＋</button>
      <button class="hbtn" onclick="copyText()" title="LINE共有用コピー">📋</button>
      <button class="hbtn" onclick="doPrint()" title="PDF出力">🖨</button>
      <button class="hbtn" onclick="openSettings()" title="設定">⚙</button>
    </div>
  </header>

  <div class="proj-strip" onclick="openProject()">
    <span id="proj-label">（作品名・日付を設定）</span>
    <span>✎</span>
  </div>

  <div class="tab-bar" id="tab-bar"></div>

  <div class="summary">
    <div class="s-item"><span class="s-num" id="s-people">0</span><span class="s-label">総乗車数</span></div>
    <div class="s-item"><span class="s-num green" id="s-cap">0</span><span class="s-label">総定員</span></div>
    <div class="s-item"><span class="s-num" id="s-remain">0</span><span class="s-label">残席</span></div>
    <div class="s-item"><span class="s-num orange" id="s-ua">0</span><span class="s-label">未配車</span></div>
  </div>

  <div class="vlist" id="vlist"></div>
</div>

<div class="ua-bar" id="ua-bar">
  <div class="ua-bar-hd">
    <span>⚠</span>
    <span class="ua-bar-title">未配車 — <span id="ua-count">0</span>名の行き先が未定</span>
    <button class="ua-bar-add" onclick="openAddMember('unassigned')">＋</button>
  </div>
  <div class="ua-chips" id="ua-chips"></div>
</div>

<div id="pview">
  <div class="p-hd">
    <div class="p-main-title" id="p-title">乗り切り表</div>
    <div class="p-meta" id="p-meta"></div>
  </div>
  <div id="p-grid"></div>
</div>

<button class="fab" onclick="openAddVehicle()">＋</button>
<div class="toast" id="toast"></div>

<!-- Modal: Project -->
<div class="mbg" id="m-proj">
  <div class="mbox">
    <div class="mhandle"></div>
    <p class="mtitle">作品情報</p>
    <div class="fg"><label class="fl">作品名</label><input class="fi" id="i-title" type="text" placeholder="例: 〇〇ドラマ Season2"></div>
    <div class="fg"><label class="fl">日付・補足</label><input class="fi" id="i-date" type="text" placeholder="例: 2026/06/23（第3話）"></div>
    <div class="mbtns">
      <button class="mbtn mc" onclick="closeModal('m-proj')">キャンセル</button>
      <button class="mbtn mok" onclick="saveProject()">保存</button>
    </div>
  </div>
</div>

<!-- Modal: Add/Edit Vehicle -->
<div class="mbg" id="m-veh">
  <div class="mbox">
    <div class="mhandle"></div>
    <p class="mtitle" id="m-veh-title">車両を追加</p>
    <div class="fg"><label class="fl">車両名</label><input class="fi" id="i-vname" type="text" placeholder="例: 本隊車(10人乗り)"></div>
    <div class="frow">
      <div class="fg"><label class="fl">車両 No.</label><input class="fi" id="i-vno" type="text" placeholder="例: 217"></div>
      <div class="fg"><label class="fl">定員</label><input class="fi" id="i-vcap" type="number" min="1" placeholder="例: 9"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">ドライバー</label><input class="fi" id="i-vdr" type="text" placeholder="例: 安武"></div>
      <div class="fg"><label class="fl">出発時刻（任意）</label><input class="fi" id="i-vdepart" type="time"></div>
    </div>
    <div class="mbtns">
      <button class="mbtn mc" onclick="closeModal('m-veh')">キャンセル</button>
      <button class="mbtn mok" onclick="saveVehicle()">保存</button>
    </div>
  </div>
</div>

<!-- Modal: Add Member -->
<div class="mbg" id="m-mem">
  <div class="mbox">
    <div class="mhandle"></div>
    <p class="mtitle" id="m-mem-title">メンバー追加</p>
    <label class="fl">一括追加（エキストラ等）</label>
    <div class="ex-row">
      <input class="fi ex-prefix" id="i-ex-prefix" type="text" placeholder="EX" maxlength="8">
      <span class="ex-sep-label">①〜</span>
      <input class="fi ex-count" id="i-ex-count" type="number" min="1" max="99" placeholder="5">
      <span class="ex-sep-label">名</span>
      <button class="ex-go" onclick="addExBulk()">一括追加</button>
    </div>
    <div class="or-divider">個別追加</div>
    <div class="fg"><label class="fl">名前 / 役職（1名）</label><input class="fi" id="i-mone" type="text" placeholder="例: 撮影①"></div>
    <div class="fg"><label class="fl">複数追加（改行区切り）</label><textarea class="fi" id="i-mmulti" rows="4" placeholder="例：&#10;撮影①&#10;撮影②&#10;照明①"></textarea></div>
    <div class="mbtns">
      <button class="mbtn mc" onclick="closeModal('m-mem')">キャンセル</button>
      <button class="mbtn mok" onclick="saveMember()">追加</button>

    </div>
    <div class="mbtns"><button class="mbtn mok" onclick="closeModal('m-set')">閉じる</button></div>

<script>
const CN = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
function cn(n) { return n <= 20 ? CN[n-1] : String(n); }

const DEFAULTS = [
  { id:1, name:"先発(マイクロ)",       no:"",    driver:"浅野", depart:"", cap:13, members:["斎藤","助監①","助監②","衣装①","衣装②","メイク①","メイク②","キャスト①","キャスト②","キャスト③","キャスト④","キャスト⑤","鴻池"] },
  { id:2, name:"本隊車(10人乗り)",     no:"217", driver:"安武", depart:"", cap:9,  members:["市川","撮影①","撮影②","照明①","録音①","録音②","録音③","スチール"] },
  { id:3, name:"野田車(アルファード)", no:"",    driver:"野田", depart:"", cap:6,  members:["室井","FOD①","FOD②","FOD③"] },
  { id:4, name:"金城車(フィット)",     no:"358", driver:"金城", depart:"", cap:3,  members:[] },
  { id:5, name:"備品車(キャラバン)",   no:"",    driver:"遊佐", depart:"", cap:1,  members:[] },
  { id:6, name:"機材車(ハイエース)",   no:"",    driver:"撮助", depart:"", cap:2,  members:["野村"] },
  { id:7, name:"照明車(ハイエース)",   no:"",    driver:"反方", depart:"", cap:2,  members:["萩さん"] },
  { id:8, name:"美トラ(2tトラック)",  no:"",    driver:"",     depart:"", cap:3,  members:[] },
  { id:9, name:"美ハイ(ハイエース)",  no:"",    driver:"",     depart:"", cap:2,  members:[] },
];

const MEMBER_DEFAULTS = [
  { id:1, name:'先発（マイクロ）', no:'', driver:'', depart:'', cap:13, members:['助監督','助監督','メイク','メイク','衣装','衣装','AP'] },
  { id:2, name:'本隊車',           no:'', driver:'', depart:'', cap:9,  members:['監督','記録','助監督','カメラ','録音','録音','スチール'] },
  { id:3, name:'機材車',           no:'', driver:'', depart:'', cap:4,  members:['撮影','撮影','撮影'] },
  { id:4, name:'照明車',           no:'', driver:'', depart:'', cap:4,  members:['照明','照明'] },
  { id:5, name:'美術ハイエース',   no:'', driver:'', depart:'', cap:4,  members:['美術','美術'] },
  { id:6, name:'備品車',           no:'', driver:'', depart:'', cap:2,  members:['制作'] },
];

// ─── State ───
let sheets = [], activeSheetId = 1, project = { title:'', note:'' };
let uid = 100, shUid = 1, spUid = 10;
let expanded = new Set(), editVid = null, addVid = null, moveVid = null, moveIdx = null, editSpId = null, sheetOptId = null;

// ─── Helpers ───
function getSheet()     { return sheets.find(s => s.id === activeSheetId) || sheets[0]; }
function getVehicles()  { return getSheet().vehicles; }
function getUnassigned(){ return getSheet().unassigned; }
function getSpecials()  { return getSheet().specials; }

function makeSpecials() {
  return [{ id: spUid++, name:'自車', icon:'🚗', members:[] }];
}
function makeSheet(name, opts={}) {
  return { id: shUid++, name, vehicles: opts.vehicles||[], unassigned: opts.unassigned||[], specials: opts.specials||makeSpecials() };
}

// ─── Persist ───
function save() {
  localStorage.setItem('norikiri', JSON.stringify({ sheets, activeSheetId, project, uid, shUid, spUid }));
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('norikiri')||'null');
    if (d) {
      if (d.sheets) {
        sheets = d.sheets; activeSheetId = d.activeSheetId || d.sheets[0]?.id || 1;
        project = d.project||{}; uid = d.uid||100; shUid = d.shUid||99; spUid = d.spUid||99;
        return;
      }
      // migrate old format
      if (d.vehicles) {
        const specials = [{ id: spUid++, name:'自車', icon:'🚗', members: d.selfDrivers||[] }];
        sheets = [{ id: shUid++, name:'移動①', vehicles: d.vehicles, unassigned: d.unassigned||[], specials }];
        activeSheetId = sheets[0].id; project = d.project||{}; uid = d.uid||100; return;
      }
    }
  } catch(_) {}
  sheets = [makeSheet('移動①', { vehicles: JSON.parse(JSON.stringify(DEFAULTS)) })];
  activeSheetId = sheets[0].id; project = { title:'', note:'' }; uid = 100;
}

// ─── Status ───
function status(v) {
  if (!v.members.length) return 'empty';
  if (v.members.length >= v.cap) return 'full';
  if (v.members.length / v.cap >= .8) return 'warn';
  return 'ok';
}

// ─── Render ───
function render() {
  const sh = getSheet();
  const list = document.getElementById('vlist');
  list.innerHTML = '';

  sh.vehicles.forEach(v => {
    const st = status(v), pct = v.cap > 0 ? Math.min(v.members.length / v.cap, 1) * 100 : 0;
    const isOpen = expanded.has(v.id);
    const metaParts = [v.driver ? `Dr. ${v.driver}` : '', v.no ? `No. ${v.no}` : ''].filter(Boolean);
    const departBadge = v.depart ? `<span class="depart-badge">🕐 ${h(v.depart)}発</span>` : '';
    const el = document.createElement('div');
    el.className = 'vcard' + (isOpen ? ' open' : '');
    el.id = 'vc-' + v.id;
    el.innerHTML = `
      <div class="vtop" onclick="tog(${v.id})">
        <div class="vdot dot-${st}"></div>
        <div class="vinfo">
          <div class="vname">${h(v.name)}${departBadge}</div>
          ${metaParts.length ? `<div class="vmeta">${h(metaParts.join('　'))}</div>` : ''}
        </div>
        <div class="vcnt ${st}">${v.members.length}<span class="sep">/${v.cap}</span></div>
        <div class="vchev">⌄</div>
      </div>
      <div class="vpbar"><div class="vpfill pfill-${st==='empty'?'ok':st}" style="width:${pct}%"></div></div>
      <div class="vmembers">
        ${v.members.length === 0 ? '<span class="no-m">乗車なし</span>'
          : v.members.map((m,i) => `<span class="chip" ${isOpen?`onclick="openMoveModal(${v.id},${i})"`:''}>${h(m)}<button class="chip-x" onclick="delMemberQuick(event,${v.id},${i})">×</button></span>`).join('')}
      </div>
      <div class="vactions">
        <button class="abtn abtn-add"  onclick="openAddMember(${v.id})">＋ 追加</button>
        <button class="abtn abtn-edit" onclick="openEditVehicle(${v.id})">✎ 編集</button>
        <button class="abtn abtn-del"  onclick="confirmDelVehicle(${v.id})">🗑 削除</button>
      </div>`;
    list.appendChild(el);
  });

  // Special sections
  sh.specials.forEach(sp => {
    const key = 'sp-' + sp.id, spOpen = expanded.has(key);
    const el = document.createElement('div');
    el.className = 'vcard self-card' + (spOpen ? ' open' : '');
    el.innerHTML = `
      <div class="vtop" onclick="togSp(${sp.id})">
        <div class="vdot" style="background:#607d8b"></div>
        <div class="vinfo"><div class="vname">${sp.icon ? sp.icon + ' ' : ''}${h(sp.name)}</div></div>
        <div class="vcnt" style="color:#607d8b">${sp.members.length}<span class="sep">名</span></div>
        <div class="vchev">⌄</div>
      </div>
      <div class="vmembers">
        ${sp.members.length === 0 ? '<span class="no-m">登録なし</span>'
          : sp.members.map((m,i) => `<span class="chip self-chip" ${spOpen?`onclick="openMoveSp(${sp.id},${i})"`:''}>${h(m)}<button class="chip-x" onclick="delSpMember(event,${sp.id},${i})">×</button></span>`).join('')}
      </div>
      <div class="vactions">
        <button class="abtn abtn-add" style="color:#607d8b;border-color:#607d8b;background:#eceff1" onclick="openAddMember('sp-${sp.id}')">＋ 追加</button>
        <button class="abtn abtn-edit" onclick="openEditSpecial(${sp.id})">✎ 名称</button>
        <button class="abtn abtn-del"  onclick="confirmDelSpecial(${sp.id})">🗑 削除</button>
      </div>`;
    list.appendChild(el);
  });

  // Add group button
  const addGrp = document.createElement('button');
  addGrp.className = 'add-group-btn';
  addGrp.textContent = '＋ グループ枠を追加（現直・現バレ・駅送り等）';
  addGrp.onclick = openAddSpecial;
  list.appendChild(addGrp);

  list.style.paddingBottom = `calc(${sh.unassigned.length > 0 ? 180 : 80}px + env(safe-area-inset-bottom,0px))`;

  // Summary
  const tp = sh.vehicles.reduce((s,v) => s + v.members.length, 0);
  const tc = sh.vehicles.reduce((s,v) => s + v.cap, 0);
  const rem = tc - tp;
  document.getElementById('s-people').textContent = tp;
  document.getElementById('s-cap').textContent    = tc;
  document.getElementById('s-remain').textContent = rem;
  document.getElementById('s-remain').className   = 's-num' + (rem < 0 ? ' red' : '');
  document.getElementById('s-ua').textContent     = sh.unassigned.length;
  document.getElementById('s-ua').className       = 's-num' + (sh.unassigned.length > 0 ? ' red' : '');

  const label = [project.title, project.note].filter(Boolean).join('　');
  document.getElementById('proj-label').textContent = label || '（作品名・日付を設定）';

  const bar = document.getElementById('ua-bar');
  if (sh.unassigned.length > 0) {
    bar.classList.add('visible');
    document.getElementById('ua-count').textContent = sh.unassigned.length;
    document.getElementById('ua-chips').innerHTML = sh.unassigned.map((m,i) =>
      `<span class="ua-chip" onclick="openMoveUnassigned(${i})">${h(m)}<button class="ua-chip-x" onclick="delUaQuick(event,${i})">×</button></span>`).join('');
  } else { bar.classList.remove('visible'); }

  renderTabs();
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  sheets.forEach(s => {
    const t = document.createElement('div');
    t.className = 'tab-item' + (s.id === activeSheetId ? ' active' : '');
    t.textContent = s.name;
    t.onclick = () => {
      if (s.id === activeSheetId) { openSheetOptions(s.id); }
      else { activeSheetId = s.id; expanded.clear(); render(); }
    };
    bar.appendChild(t);
  });
  const add = document.createElement('button');
  add.className = 'tab-add'; add.textContent = '＋'; add.title = 'シートを追加';
  add.onclick = openAddSheet;
  bar.appendChild(add);
}

function tog(id)    { expanded.has(id)      ? expanded.delete(id)      : expanded.add(id);      render(); }
function togSp(id)  { const k='sp-'+id; expanded.has(k) ? expanded.delete(k) : expanded.add(k); render(); }

// ─── Vehicle CRUD ───
function openAddVehicle() {
  editVid = null;
  document.getElementById('m-veh-title').textContent = '車両を追加';
  ['i-vname','i-vno','i-vcap','i-vdr','i-vdepart'].forEach(id => document.getElementById(id).value = '');
  showModal('m-veh'); setTimeout(() => document.getElementById('i-vname').focus(), 280);
}
function openEditVehicle(id) {
  const v = getVehicles().find(x => x.id === id); if (!v) return;
  editVid = id;
  document.getElementById('m-veh-title').textContent = '車両を編集';
  document.getElementById('i-vname').value   = v.name;
  document.getElementById('i-vno').value     = v.no;
  document.getElementById('i-vcap').value    = v.cap;
  document.getElementById('i-vdr').value     = v.driver;
  document.getElementById('i-vdepart').value = v.depart || '';
  showModal('m-veh');
}
function saveVehicle() {
  const name = document.getElementById('i-vname').value.trim();
  const cap  = parseInt(document.getElementById('i-vcap').value);
  if (!name) { toast('車両名を入力してください'); return; }
  if (!cap || cap < 1) { toast('定員を入力してください'); return; }
  const no = document.getElementById('i-vno').value.trim();
  const dr = document.getElementById('i-vdr').value.trim();
  const depart = document.getElementById('i-vdepart').value.trim();
  const sh = getSheet();
  if (editVid) {
    const v = sh.vehicles.find(x => x.id === editVid);
    if (v) Object.assign(v, { name, no, cap, driver:dr, depart });
    toast('更新しました');
  } else {
    sh.vehicles.push({ id: uid++, name, no, driver:dr, depart, cap, members:[] });
    toast('車両を追加しました');
  }
  save(); closeModal('m-veh'); render();
}
function confirmDelVehicle(id) {
  const v = getVehicles().find(x => x.id === id); if (!v) return;
  document.getElementById('conf-title').textContent = '車両を削除';
  document.getElementById('conf-msg').textContent   = `「${v.name}」を削除します。\n乗車メンバーも削除されます。`;
  document.getElementById('conf-ok').onclick = () => {
    const sh = getSheet(); sh.vehicles = sh.vehicles.filter(x => x.id !== id); expanded.delete(id);
    save(); closeModal('m-conf'); render(); toast('削除しました');
  };
  showModal('m-conf');
}

// ─── Member CRUD ───
function openAddMember(vid) {
  addVid = vid;
  const sh = getSheet();
  let label = '未配車プールに追加';
  if (vid === 'unassigned') label = '未配車プールに追加';
  else if (typeof vid === 'string' && vid.startsWith('sp-')) {
    const sp = sh.specials.find(x => x.id === parseInt(vid.slice(3)));
    label = (sp ? sp.name : 'グループ') + ' にメンバー追加';
  } else {
    label = (sh.vehicles.find(x => x.id === vid)?.name || '') + ' にメンバー追加';
  }
  document.getElementById('m-mem-title').textContent = label;
  ['i-mone','i-mmulti','i-ex-prefix','i-ex-count'].forEach(id => document.getElementById(id).value = '');
  showModal('m-mem'); setTimeout(() => document.getElementById('i-mone').focus(), 280);
}
function saveMember() {
  const one   = document.getElementById('i-mone').value.trim();
  const multi = document.getElementById('i-mmulti').value.trim();
  const names = [];
  if (one)   names.push(one);
  if (multi) multi.split('\n').map(s => s.trim()).filter(Boolean).forEach(n => names.push(n));
  if (!names.length) { toast('名前を入力してください'); return; }
  _addNames(names);
  save(); closeModal('m-mem'); render(); toast(`${names.length}名追加しました`);
}
function addExBulk() {
  const prefix = document.getElementById('i-ex-prefix').value.trim() || 'EX';
  const count  = parseInt(document.getElementById('i-ex-count').value);
  if (!count || count < 1 || count > 99) { toast('人数を1〜99で入力してください'); return; }
  const names = Array.from({length: count}, (_, i) => prefix + cn(i+1));
  _addNames(names);
  save(); closeModal('m-mem'); render(); toast(`${prefix}① 〜 ${prefix}${cn(count)} を追加しました`);
}
function _addNames(names) {
  const sh = getSheet();
  if (addVid === 'unassigned') {
    names.forEach(n => sh.unassigned.push(n));
  } else if (typeof addVid === 'string' && addVid.startsWith('sp-')) {
    const sp = sh.specials.find(x => x.id === parseInt(addVid.slice(3)));
    if (sp) names.forEach(n => sp.members.push(n));
  } else {
    const v = sh.vehicles.find(x => x.id === addVid);
    if (v) names.forEach(n => { if (!v.members.includes(n)) v.members.push(n); });
  }
}
function delMemberQuick(e, vid, idx) {
  e.stopPropagation();
  const v = getVehicles().find(x => x.id === vid); if (!v) return;
  const name = v.members.splice(idx, 1)[0];
  save(); render(); toast(`「${name}」を削除しました`);
}
function delUaQuick(e, idx) {
  e.stopPropagation();
  const name = getSheet().unassigned.splice(idx, 1)[0];
  save(); render(); toast(`「${name}」を削除しました`);
}
function delSpMember(e, spId, idx) {
  e.stopPropagation();
  const sp = getSpecials().find(x => x.id === spId); if (!sp) return;
  const name = sp.members.splice(idx, 1)[0];
  save(); render(); toast(`「${name}」を削除しました`);
}

// ─── Move modal ───
function _buildMoveTargets(excludeVid, excludeSpId) {
  const sh = getSheet();
  const targets = document.getElementById('m-move-targets');
  targets.innerHTML = '';

  sh.vehicles.filter(v => v.id !== excludeVid).forEach(dest => {
    const isFull = dest.members.length >= dest.cap;
    const btn = document.createElement('button');
    btn.className = 'move-dest-btn';
    btn.innerHTML = `<span class="move-dest-name">${h(dest.name)}</span><span class="move-dest-cnt${isFull?' cnt-full':''}">${dest.members.length}/${dest.cap}${isFull?'　満':''}</span>`;
    btn.onclick = () => _moveToVehicle(dest.id);
    targets.appendChild(btn);
  });

  const sep = document.createElement('hr'); sep.className = 'move-dest-sep'; targets.appendChild(sep);

  sh.specials.filter(sp => sp.id !== excludeSpId).forEach(sp => {
    const btn = document.createElement('button');
    btn.className = 'move-dest-btn';
    btn.innerHTML = `<span class="move-dest-name">${sp.icon||''} ${h(sp.name)}</span><span class="move-dest-cnt">${sp.members.length}名</span>`;
    btn.onclick = () => _moveToSpecial(sp.id);
    targets.appendChild(btn);
  });

  const uaBtn = document.createElement('button');
  uaBtn.className = 'move-dest-btn ua-dest';
  uaBtn.innerHTML = `<span class="move-dest-name">⚠ 未配車に移す</span><span class="move-dest-cnt">${sh.unassigned.length}名</span>`;
  uaBtn.onclick = () => _moveToUnassigned();
  targets.appendChild(uaBtn);
}
function _getMoveName() {
  const sh = getSheet();
  if (moveVid === 'unassigned') return sh.unassigned[moveIdx];
  if (typeof moveVid === 'string' && moveVid.startsWith('sp-')) {
    return sh.specials.find(x => x.id === parseInt(moveVid.slice(3)))?.members[moveIdx];
  }
  return sh.vehicles.find(x => x.id === moveVid)?.members[moveIdx];
}
function _removeMoveSource() {
  const sh = getSheet();
  if (moveVid === 'unassigned') { return sh.unassigned.splice(moveIdx, 1)[0]; }
  if (typeof moveVid === 'string' && moveVid.startsWith('sp-')) {
    return sh.specials.find(x => x.id === parseInt(moveVid.slice(3)))?.members.splice(moveIdx, 1)[0];
  }
  return sh.vehicles.find(x => x.id === moveVid)?.members.splice(moveIdx, 1)[0];
}
function _moveToVehicle(toVid) {
  const name = _removeMoveSource(); if (!name) return;
  const to = getVehicles().find(x => x.id === toVid); if (!to) return;
  to.members.push(name);
  save(); closeModal('m-move'); render(); toast(`「${name}」→ ${to.name}`);
}
function _moveToSpecial(toSpId) {
  const name = _removeMoveSource(); if (!name) return;
  const sp = getSpecials().find(x => x.id === toSpId); if (!sp) return;
  sp.members.push(name);
  save(); closeModal('m-move'); render(); toast(`「${name}」→ ${sp.name}`);
}
function _moveToUnassigned() {
  const name = _removeMoveSource(); if (!name) return;
  getSheet().unassigned.push(name);
  save(); closeModal('m-move'); render(); toast(`「${name}」→ 未配車`);
}

// ─── Rename ───
function saveRename() {
  const newName = document.getElementById('i-rename').value.trim();
  if (!newName) { toast('名前を入力してください'); return; }
  const sh = getSheet();
  if (moveVid === 'unassigned') {
    sh.unassigned[moveIdx] = newName;
  } else if (typeof moveVid === 'string' && moveVid.startsWith('sp-')) {
    const sp = sh.specials.find(x => x.id === parseInt(moveVid.slice(3)));
    if (sp) sp.members[moveIdx] = newName;
  } else {
    const v = sh.vehicles.find(x => x.id === moveVid);
    if (v) v.members[moveIdx] = newName;
  }
  save(); closeModal('m-move'); render(); toast(`「${newName}」に変更しました`);
}

// ─── Reorder ───
function _getMoveArr() {
  const sh = getSheet();
  if (moveVid === 'unassigned') return sh.unassigned;
  if (typeof moveVid === 'string' && moveVid.startsWith('sp-')) {
    return sh.specials.find(x => x.id === parseInt(moveVid.slice(3)))?.members;
  }
  return sh.vehicles.find(x => x.id === moveVid)?.members;
}
function moveToFront() {
  const arr = _getMoveArr(); if (!arr || moveIdx == null) return;
  if (moveIdx === 0) { toast('すでに先頭です'); return; }
  const [name] = arr.splice(moveIdx, 1);
  arr.unshift(name);
  save(); closeModal('m-move'); render(); toast(`「${name}」を先頭に移動しました`);
}

// ─── Copy text (LINE share) ───
function buildTextCopy() {
  const sh = getSheet();
  const lines = [];
  const label = [project.title, project.note].filter(Boolean).join('　');
  lines.push(`【乗り切り】${label || '乗り切り表'}`);
  if (sheets.length > 1) lines.push(`◆ ${sh.name}`);
  sh.vehicles.forEach(v => {
    lines.push('');
    const meta = [];
    if (v.driver) meta.push(`Dr.${v.driver}`);
    if (v.no)     meta.push(`No.${v.no}`);
    if (v.depart) meta.push(`${v.depart}発`);
    lines.push(`▶ ${v.name}　${v.members.length}/${v.cap}名${meta.length ? `（${meta.join('・')}）` : ''}`);
    lines.push(v.members.length ? v.members.join('・') : '（乗車なし）');
  });
  sh.specials.forEach(sp => {
    if (sp.members.length > 0) {
      lines.push(''); lines.push(`${sp.icon||''}${sp.name}　${sp.members.length}名`); lines.push(sp.members.join('・'));
    }
  });
  if (sh.unassigned.length > 0) {
    lines.push(''); lines.push(`⚠ 未配車　${sh.unassigned.length}名`); lines.push(sh.unassigned.join('・'));
  }
  return lines.join('\n').trim();
}
async function copyText() {
  const text = buildTextCopy();
  try { await navigator.clipboard.writeText(text); }
  catch(_) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0,99999);
    document.execCommand('copy'); document.body.removeChild(ta);
  }
  toast('コピーしました');
}

// ─── PDF / Print ───
function doPrint() {
  const now = new Date();
  const mm  = String(now.getMonth()+1).padStart(2,'0'), dd = String(now.getDate()).padStart(2,'0');
  const orig = document.title;
  document.title = `${mm}${dd}乗り切り`;
  buildPrint(); window.print();
  setTimeout(() => { document.title = orig; }, 1000);
}
function buildPrint() {
  const sh = getSheet();
  const now = new Date();
  const ymd = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  const hhmm = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const label = [project.title, project.note].filter(Boolean).join('　') || '乗り切り表';
  const shLabel = sheets.length > 1 ? `　◆ ${sh.name}` : '';
  document.getElementById('p-title').textContent = label + shLabel;
  document.getElementById('p-meta').innerHTML = `出力日時<br>${ymd} ${hhmm}`;

  const grid = document.getElementById('p-grid'); grid.innerHTML = '';
  const hasDepart = sh.vehicles.some(v => v.depart);
  const colSpan = 4 + (hasDepart ? 1 : 0) + 1;
  const tbl = document.createElement('table'); tbl.className = 'p-tbl';

  const thead = document.createElement('thead');
  let thCells = `<th style="width:26%">車両名</th><th style="width:9%">ドライバー</th><th style="width:9%">車番</th><th class="th-c" style="width:7%">定/乗</th>`;
  if (hasDepart) thCells += `<th style="width:8%">出発</th>`;
  thCells += `<th>搭乗メンバー</th>`;
  thead.innerHTML = `<tr>${thCells}</tr>`; tbl.appendChild(thead);

  const tbody = document.createElement('tbody');
  sh.vehicles.forEach(v => {
    const st = status(v), stKey = st==='empty'?'ok':st;
    const cntCls = st==='full'?'cnt-full':st==='warn'?'cnt-warn':'cnt-ok';
    const tags = v.members.map(m => `<span class="p-ntag nt-v">${h(m)}</span>`).join('');
    const tr = document.createElement('tr'); if (st==='full') tr.className='tr-full';
    let cells = `<td class="td-name st-${stKey}">${h(v.name)}</td>`;
    cells += `<td class="td-sub">${h(v.driver||'—')}</td><td class="td-sub">${h(v.no||'—')}</td>`;
    cells += `<td class="td-cnt ${cntCls}">${v.members.length}<span style="font-size:10px;font-weight:400;color:#999">/${v.cap}</span></td>`;
    if (hasDepart) cells += `<td class="td-dep">${v.depart ? h(v.depart)+'発' : ''}</td>`;
    cells += `<td class="td-mem">${tags||'<span style="color:#bbb;font-style:italic;font-size:10px">乗車なし</span>'}</td>`;
    tr.innerHTML = cells; tbody.appendChild(tr);
  });

  sh.specials.forEach(sp => {
    if (sp.members.length === 0) return;
    const div = document.createElement('tr'); div.className = 'tr-divider';
    div.innerHTML = `<td colspan="${colSpan}">${sp.icon||''}　${h(sp.name)}</td>`; tbody.appendChild(div);
    const tr = document.createElement('tr');
    const tags = sp.members.map(m => `<span class="p-ntag nt-self">${h(m)}</span>`).join('');
    let cells = `<td class="td-name st-self">${h(sp.name)}</td><td class="td-sub" colspan="2"></td>`;
    cells += `<td class="td-cnt cnt-self">${sp.members.length}<span style="font-size:10px;font-weight:400;color:#999">名</span></td>`;
    if (hasDepart) cells += `<td></td>`;
    cells += `<td class="td-mem">${tags}</td>`;
    tr.innerHTML = cells; tbody.appendChild(tr);
  });

  if (sh.unassigned.length > 0) {
    const div = document.createElement('tr'); div.className = 'tr-divider dv-ua';
    div.innerHTML = `<td colspan="${colSpan}">⚠　未配車（車両未定）</td>`; tbody.appendChild(div);
    const tr = document.createElement('tr');
    const tags = sh.unassigned.map(m => `<span class="p-ntag nt-ua">${h(m)}</span>`).join('');
    let cells = `<td class="td-name st-ua">未配車</td><td class="td-sub" colspan="2">車両未定</td>`;
    cells += `<td class="td-cnt cnt-full">${sh.unassigned.length}<span style="font-size:10px;font-weight:400;color:#999">名</span></td>`;
    if (hasDepart) cells += `<td></td>`;
    cells += `<td class="td-mem">${tags}</td>`;
    tr.innerHTML = cells; tbody.appendChild(tr);
  }

  tbl.appendChild(tbody); grid.appendChild(tbl);
}

// ─── Toast ───
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2200);
}

function h(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
